spring.application.name=java-keyguard-backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/keyguarddb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

springdoc.swagger-ui.path=/swagger-ui.html

encryption.secret=${ENCRYPTION_SECRET:1234567890123456}

spring.data.web.page-serialization-mode=via-dto